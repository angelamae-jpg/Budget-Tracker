<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUDGET</title>
</head>
<style>
  * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, -apple-system, sans-serif;
}

body {
  background: rgb(234, 191, 234);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 16px;
}

#app {
  width: 100%;
  max-width: 450px;
  background: white;
  border-radius: 28px;
  padding: 28px 24px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.08);
}

h2 {
  font-size: 28px;
  font-weight: 500;
  color: #2a2a2a;
  margin-bottom: 8px;
  text-align: center;
}

#bal {
  font-size: 52px;
  font-weight: 500;
  color: #1a1a2e;
  margin-bottom: 24px;
  border-bottom: 2px solid #f0e0f2;
  padding-bottom: 8px;
}

input {
  width: 100%;
  padding: 14px 18px;
  border: 1px solid #ddd;
  border-radius: 30px;
  font-size: 16px;
  margin-bottom: 12px;
  outline: none;
  background: #fafafa;
}

input:focus {
  border-color: #b28bbd;
  background: white;
}

button {
  width: 100%;
  background: #382e40;
  color: white;
  border: none;
  padding: 14px;
  border-radius: 30px;
  font-size: 16px;
  margin: 8px 0 24px 0;
  cursor: pointer;
}

button:hover {
  background: #4a3d54;
}

ul {
  list-style: none;
  max-height: 250px;
  overflow-y: auto;
  border-top: 1px solid #eee;
  padding-top: 12px;
}

li {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 8px;
  border-bottom: 1px solid #f0f0f0;
  color: #333;
}

.item-text {
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.amount-badge {
  background: #f0e4f5;
  padding: 4px 12px;
  border-radius: 30px;
  font-size: 14px;
  margin-left: 10px;
}

#list:empty::before {
  display: block;
  text-align: center;
  color: #aaa;
  padding: 20px;
  font-style: italic;
}
</style>
<body>
    <div id="app">
  <h2>My Budget</h2>
  <h1 id="bal">0</h1>
  
  <input type="text" id="desc" placeholder="Item">
  <input type="number" id="amt" placeholder="Amount">
  <button onclick="add()">Add</button>

  <ul id="list"></ul>
</div>
<script>
    let total = 0;
const b = document.getElementById('bal');
const d = document.getElementById('desc');
const a = document.getElementById('amt');
const l = document.getElementById('list');

function add() {
  let v = parseFloat(a.value);
  let n = d.value;

  if (n && v) {
    total += v;
    b.innerText = total;
    
    let item =  localStorage.setItem("item",n);

    const  amount = localStorage.setItem("amount",total);

    const get_item = localStorage.getItem("item");

    const get_amount = localStorage.getItem("amount")

    let i = document.createElement('li');
    i.innerText = get_item + ": " + get_amount;
    l.appendChild(i);
  
    console.log(get_item);
    
  }
}
</script>
</body>
</html>
